<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximos Trenes - Parque Polvoranca</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-trenes">
    <div class="bg-glow"></div>
    
    <header>
        <div class="title-container">
            <div class="line-badge">C5</div>
            <div>
                <h1 class="station-name">Parque Polvoranca</h1>
                <p class="subtitle">Próximos trenes de Cercanías Renfe</p>
            </div>
        </div>
        <div class="clock" id="clock">00:00</div>
    </header>

    <div class="table-header">
        <div>Hora</div>
        <div>Destino</div>
        <div style="text-align: right;">Llegada</div>
    </div>

    <main class="main-content" id="trains-container">
        <!-- Rows will be injected here via JS -->
    </main>

    <footer>
        <div id="status-msg">Actualizando...</div>
        <div id="last-update">Última actualización: --:--</div>
    </footer>

    <script src="js/trenes.js"></script>
</body>
</html>
